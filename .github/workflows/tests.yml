name: tests

on:
  push:
    branches:
      - main
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4]
        laravel: ['11.*', '12.*']

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.laravel == '12.*' && '^10.0' || '^9.0' }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Check Code Style (Pint)
        run: vendor/bin/pint --test
        
      - name: Static Code Analysis (Larastan)
        run: vendor/bin/phpstan analyse --memory-limit=2G --error-format=github

      - name: Execute tests
        run: vendor/bin/phpunit
